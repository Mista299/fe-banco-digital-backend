name: Sync to Mirror

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MIRROR_SSH_KEY }}

      - name: Add mirror as remote and push
        run: |
          git remote add mirror git@github.com:Camilo-Marsel/Repo-Backend-Espejo.git
          git push mirror HEAD:main --force
