name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build and run tests with JaCoCo
        run: mvn -B clean verify

      - name: 🔍 DEBUG - Check JaCoCo files
        run: |
          echo "=== Check jacoco.exec ==="
          ls -la target/jacoco.exec || echo "❌ NOT FOUND"
          echo ""
          echo "=== Check jacoco.xml ==="
          ls -la target/site/jacoco/jacoco.xml || echo "❌ NOT FOUND"
          echo ""
          echo "=== XML content preview ==="
          head -20 target/site/jacoco/jacoco.xml 2>/dev/null || echo "No XML content"

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=Mista299_fe-banco-digital-backend \
            -Dsonar.organization=mista299 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=false

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/