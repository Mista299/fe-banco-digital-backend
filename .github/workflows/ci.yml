name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para SonarCloud

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run tests with JaCoCo
        run: mvn -B clean verify -Dtest=!DataLoaderTest

      - name: Debug - Verify JaCoCo report
        run: |
          echo "=== JaCoCo Report Debug ==="
          echo "Checking jacoco.exec:"
          ls -la target/jacoco.exec || echo "❌ jacoco.exec not found"
          echo ""
          echo "Checking jacoco.xml:"
          ls -la target/site/jacoco/jacoco.xml || echo "❌ jacoco.xml not found"
          echo ""
          echo "JaCoCo report size:"
          find target/site/jacoco -name "*.xml" -exec ls -la {} \;

      - name: SonarCloud Scan
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Running SonarCloud analysis..."
          mvn sonar:sonar \
            -Dsonar.projectKey=Mista299_fe-banco-digital-backend \
            -Dsonar.organization=mista299 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=false \
            -Dsonar.verbose=true

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Upload Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/*.xml