name: SonarCloud Analysis
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Run tests with JaCoCo
        run: mvn clean verify -Dtest=!DataLoaderTest
      
      - name: Debug - Verify JaCoCo report
        run: |
          echo "Checking if jacoco.exec exists:"
          ls -la target/jacoco.exec || echo "jacoco.exec not found"
          echo "Checking if jacoco.xml exists:"
          ls -la target/site/jacoco/jacoco.xml || echo "jacoco.xml not found"
      
      - name: SonarCloud Scan with Maven
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=Mista299_fe-banco-digital-backend \
            -Dsonar.organization=mista299 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=false