name: SonarCloud Analysis
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 🔴 IMPORTANTE: Ejecutar tests y generar reporte de cobertura
      - name: Run tests with JaCoCo
        run: mvn clean verify
      
      # Opcional: Verificar que el reporte existe
      - name: Verify JaCoCo report
        run: |
          if [ -f "target/site/jacoco/jacoco.xml" ]; then
            echo "✅ JaCoCo report found"
            ls -la target/site/jacoco/
          else
            echo "❌ JaCoCo report NOT found"
            exit 1
          fi
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Mista299_fe-banco-digital-backend
            -Dsonar.organization=mista299
            -Dsonar.qualitygate.wait=false
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml