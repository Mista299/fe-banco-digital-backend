spring.application.name=banco-digital

# Conexión a PostgreSQL (recomendado usar variables de entorno en vez de hardcodear credenciales)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banco2026}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# En BD vacía, a veces "update" no crea tablas y solo intenta ALTER (y falla el arranque con seed).
# Por defecto: create (recrea tablas al iniciar; ideal para dev). En .env puedes poner DDL_AUTO=update cuando ya tengas esquema estable y quieras conservar datos.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secreto=BancoDigital2026ClaveSecretaSuperSeguraParaFirmarTokensJWTHS256
jwt.expiracion-access-ms=600000
jwt.expiracion-refresh-dias=7