spring.application.name=banco-digital

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banco2026}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

jwt.secreto=${JWT_SECRET}
jwt.expiracion-access-ms=600000
jwt.expiracion-refresh-dias=7

server.port=${PORT:8080}
app.https=${HTTPS_SEGURO:false}
app.cors.origenes=${CORS_ORIGENES:http://localhost:3000,http://localhost:5173}

spring.jpa.open-in-view=false

# Logging — silenciar ruido innecesario
logging.level.root=WARN
logging.level.fe.banco_digital=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.boot.devtools=WARN
logging.level.org.springframework.boot.context=WARN
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=30000
